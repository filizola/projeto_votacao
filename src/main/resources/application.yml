spring:
  application:
    name: desafio-votacao
  datasource:
    url: jdbc:h2:file:./data/votacao;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

votacao:
  sessao:
    duracao-padrao-minutos: 1

logging:
  level:
    com.votacao: INFO
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
